<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck AI | Dating Intelligence</title>
    <!-- Link to n8n official styles -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
        /* iPhone-style Font Stack */
        :root {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #ffffff; /* Clean white background */
            color: #000000; /* Default text is black */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 500px;
            padding: 20px;
            margin-bottom: -50px; /* Pulls header closer to chat */
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: #6e6e73; /* Grey text like iOS settings */
            font-size: 1rem;
            line-height: 1.4;
            font-weight: 400;
        }

        /* --- THE CRITICAL VISIBILITY FIXES --- */

        /* 1. Set the bubble colors */
        :root {
            --chat--color--primary: #34c759; /* Bright iOS Green for user */
            --chat--color--primary-shade-50: #248a3d; /* Darker green for hover/active */
            --chat--color--light: #f2f2f7; /* Light grey for AI bot bubbles */
            --chat--color--white: #ffffff; /* Chat window background */
        }

        /* 2. FORCE user message text to be white for visibility */
        .n8n-chat .n8n-chat-messages .n8n-chat-message.n8n-chat-message-user .n8n-chat-message-text {
            color: #ffffff !important; /* Forces your text to be white on green */
            font-weight: 500;
        }

        /* 3. Style the input area to feel like iMessage */
        .n8n-chat .n8n-chat-input {
            border-top: 1px solid #d1d1d6;
            background-color: #ffffff;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>🚨 VibeCheck AI</h1>
        <p>Your protective, brutally honest AI dating assistant. Paste a Hinge bio, profile prompts, or low-effort pick-up lines to expose the red flags instantly.</p>
    </div>

    <!-- The actual interactive chat setup -->
    <div id="n8n-chat"></div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        createChat({
            target: '#n8n-chat',
            mode: 'window', /* Changes to 'fullscreen' if you want it to take up the whole screen container */
            webhookUrl: 'https://mohakban.app.n8n.cloud/webhook/d77602f8-2fdc-45c6-9456-4477eb5b95ae/chat', // <--- Drop your active production URL here
            // Optional: Customize the initial messages
            initialMessages: [
                'Hi!Im MoMo Paste a dating profile bio or message you want me to analyze.',
                'I am here to protect you from the creeps 24/7.'
            ],
            // Customize placeholders
            inputPlaceholder: 'Paste bio or ask VibeCheck...',
        });
    </script>
</body>
</html>
